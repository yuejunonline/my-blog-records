name: 部署博客到 GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v3

      - name: 设置 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # 升级到稳定大版本 20，解决 ESM 兼容问题

      - name: 强力安装依赖
        run: |
          npm install -g hexo-cli
          rm -rf node_modules package-lock.json # 彻底清除本地上传的冲突文件
          npm install --force

      - name: 生成网页
        run: |
          hexo clean
          hexo generate

      - name: 强制覆盖旧博客
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          repository-name: yuejunonline/yuejunonline.github.io
          branch: master
          token: ${{ secrets.BLOG_TOKEN }}
          clean: true
